<g transform="translate(240,0)"><g class="f" style="animation-duration:8.4s;animation-delay:-4s"><use xlink:href="#p"/></g></g>
<g transform="translate(800,0)"><g class="f" style="animation-duration:7.6s;animation-delay:-0.5s"><use xlink:href="#p"/></g></g>
