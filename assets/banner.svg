<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">bujhmml cosmic engineering banner</title>
  <desc id="desc">A dark sci-fi banner with subtle orbit animation, stars, and engineering-oriented typography.</desc>
  <defs>
    <linearGradient id="bg" x1="110" y1="34" x2="1114" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04070d"/>
      <stop offset="0.55" stop-color="#07111d"/>
      <stop offset="1" stop-color="#050813"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(268 128) rotate(22.25) scale(320 228)">
      <stop stop-color="#15324e" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#15324e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(944 214) rotate(90) scale(190 190)">
      <stop stop-color="#4FC7F3" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#4FC7F3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="58" y1="54" x2="1142" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D6F2FF" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#8CCFEA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D6F2FF" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FCFF"/>
      <stop offset="1" stop-color="#82D7FF"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#D8F5FF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#D8F5FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#8EBFD8" stroke-opacity="0.08"/>
    </pattern>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <path d="M0 1.25H8" stroke="#BFE7FB" stroke-opacity="0.05"/>
    </pattern>
    <radialGradient id="star-core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(22 22)">
      <stop stop-color="#FDFEFF"/>
      <stop offset="1" stop-color="#FDFEFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <clipPath id="radar-clip">
      <circle r="118"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#glow-left)"/>
  <rect width="1200" height="420" fill="url(#glow-right)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#scanlines)" opacity="0.7"/>

  <rect x="32" y="32" width="1136" height="356" rx="28" fill="#050B14" fill-opacity="0.62" stroke="url(#frame)" stroke-width="1.5"/>
  <rect x="58" y="58" width="1084" height="304" rx="22" stroke="#D9F4FF" stroke-opacity="0.07"/>
  <path d="M60 124H1140" stroke="#CFEFFF" stroke-opacity="0.06"/>
  <path d="M60 296H1140" stroke="#CFEFFF" stroke-opacity="0.05"/>
  <path d="M724 210H844" stroke="#BFE8FB" stroke-opacity="0.14" stroke-linecap="round"/>
  <circle cx="844" cy="210" r="2.5" fill="#D9F7FF"/>

  <g opacity="0.85">
    <circle cx="116" cy="84" r="1.4" fill="#F4FCFF">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="5.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="198" cy="160" r="1.2" fill="#D7F4FF">
      <animate attributeName="opacity" values="0.18;0.8;0.18" dur="6.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="312" cy="92" r="1.6" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.22;1;0.22" dur="4.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="482" cy="72" r="1.2" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.18;0.7;0.18" dur="7.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="608" cy="144" r="1.4" fill="#D8F7FF">
      <animate attributeName="opacity" values="0.18;0.88;0.18" dur="6.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="828" cy="86" r="1.1" fill="#F6FDFF">
      <animate attributeName="opacity" values="0.16;0.72;0.16" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1014" cy="112" r="1.35" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.2;0.86;0.2" dur="6.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1082" cy="316" r="1.45" fill="#E8FAFF">
      <animate attributeName="opacity" values="0.22;0.92;0.22" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="892" cy="344" r="1.2" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.18;0.82;0.18" dur="7.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="154" cy="328" r="1.35" fill="#ECFBFF">
      <animate attributeName="opacity" values="0.18;0.82;0.18" dur="5.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(92 102)">
    <text x="0" y="0" fill="#95CBE3" font-size="14" font-family="Segoe UI, Trebuchet MS, Helvetica, Arial, sans-serif" letter-spacing="4">SYSTEMS • INTERFACES • DELIVERY</text>
    <text x="0" y="92" fill="url(#accent)" font-size="76" font-weight="700" font-family="Segoe UI, Trebuchet MS, Helvetica, Arial, sans-serif" letter-spacing="3">BUJHMML</text>
    <text x="0" y="132" fill="#E7F7FF" font-size="24" font-family="Segoe UI, Trebuchet MS, Helvetica, Arial, sans-serif">Full-stack engineer with a backend and DevOps bias</text>
    <text x="0" y="170" fill="#9DB4C3" font-size="19" font-family="Segoe UI, Trebuchet MS, Helvetica, Arial, sans-serif">APIs, product surfaces, observability, automation, and production workflows</text>

    <g transform="translate(0 210)">
      <rect width="124" height="34" rx="17" fill="#0B1521" stroke="#A8D8EE" stroke-opacity="0.2"/>
      <rect x="136" width="148" height="34" rx="17" fill="#0B1521" stroke="#A8D8EE" stroke-opacity="0.2"/>
      <rect x="296" width="126" height="34" rx="17" fill="#0B1521" stroke="#A8D8EE" stroke-opacity="0.2"/>
      <rect x="434" width="154" height="34" rx="17" fill="#0B1521" stroke="#A8D8EE" stroke-opacity="0.2"/>
      <text x="24" y="22" fill="#E8F9FF" font-size="14" font-family="Consolas, Menlo, Monaco, monospace">python</text>
      <text x="160" y="22" fill="#E8F9FF" font-size="14" font-family="Consolas, Menlo, Monaco, monospace">typescript</text>
      <text x="322" y="22" fill="#E8F9FF" font-size="14" font-family="Consolas, Menlo, Monaco, monospace">fastapi</text>
      <text x="458" y="22" fill="#E8F9FF" font-size="14" font-family="Consolas, Menlo, Monaco, monospace">kubernetes</text>
    </g>
  </g>

  <g transform="translate(900 210)">
    <circle r="132" fill="#07111D" fill-opacity="0.5"/>
    <circle r="132" stroke="#C9EEFF" stroke-opacity="0.14"/>
    <ellipse rx="152" ry="90" stroke="#A8DCF3" stroke-opacity="0.16"/>
    <ellipse rx="128" ry="128" stroke="#BDE7FB" stroke-opacity="0.13"/>
    <ellipse rx="100" ry="54" stroke="#D5F6FF" stroke-opacity="0.18" stroke-dasharray="4 10"/>
    <path d="M-162 0H162" stroke="#A9DDF4" stroke-opacity="0.08" stroke-dasharray="2 8"/>
    <path d="M0 -162V162" stroke="#A9DDF4" stroke-opacity="0.08" stroke-dasharray="2 8"/>

    <g clip-path="url(#radar-clip)">
      <path d="M0 0L0 -134A134 134 0 0 1 96 -94Z" fill="url(#sweep)" opacity="0.22">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      </path>
    </g>

    <g opacity="0.82">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite"/>
      <circle cx="0" cy="-118" r="4.2" fill="#DFF8FF"/>
      <circle cx="94" cy="0" r="3.4" fill="#88DFFF"/>
      <circle cx="-86" cy="58" r="3" fill="#C9F4FF"/>
      <circle cx="34" cy="108" r="2.7" fill="#ECFCFF"/>
    </g>

    <g opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      <circle cx="0" cy="-152" r="2.1" fill="#D3F4FF"/>
      <circle cx="140" cy="18" r="2.1" fill="#D3F4FF"/>
      <circle cx="-134" cy="-28" r="2.1" fill="#D3F4FF"/>
    </g>

    <circle r="24" fill="url(#star-core)" filter="url(#soft-glow)"/>
    <circle r="8.5" fill="#FFFFFF"/>
    <circle r="20" stroke="#DFF8FF" stroke-opacity="0.18"/>
    <circle r="52" stroke="#DFF8FF" stroke-opacity="0.08"/>
  </g>
</svg>
