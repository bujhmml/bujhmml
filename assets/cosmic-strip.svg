<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Subtle cosmic strip</title>
  <defs>
    <linearGradient id="bg" x1="40" y1="16" x2="1160" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04070D"/>
      <stop offset="0.52" stop-color="#08111D"/>
      <stop offset="1" stop-color="#04070D"/>
    </linearGradient>
    <linearGradient id="rail" x1="120" y1="60" x2="960" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8CD6F8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#E7F8FF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#8CD6F8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(992 60) rotate(90) scale(72 72)">
      <stop stop-color="#57C8F4" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#57C8F4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="120" rx="24" fill="url(#bg)"/>
  <rect x="12" y="12" width="1176" height="96" rx="18" stroke="#D9F4FF" stroke-opacity="0.08"/>
  <path d="M40 24H1160" stroke="#B5E6FB" stroke-opacity="0.06"/>
  <path d="M40 96H1160" stroke="#B5E6FB" stroke-opacity="0.06"/>

  <circle cx="992" cy="60" r="72" fill="url(#halo)"/>
  <path d="M138 60H946" stroke="url(#rail)" stroke-width="2" stroke-linecap="round"/>
  <path d="M946 60C976 60 996 40 996 10" stroke="#CFF1FF" stroke-opacity="0.18"/>
  <path d="M946 60C976 60 996 80 996 110" stroke="#CFF1FF" stroke-opacity="0.18"/>
  <circle cx="254" cy="60" r="3" fill="#EEF9FF"/>
  <circle cx="468" cy="60" r="3" fill="#B6E9FB"/>
  <circle cx="692" cy="60" r="3" fill="#EEF9FF"/>
  <circle cx="946" cy="60" r="4" fill="#8EE3FF"/>
  <circle cy="60" r="2.6" fill="#A3EAFF">
    <animate attributeName="cx" values="160;930;160" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(996 60)">
