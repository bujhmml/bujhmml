name: Generate Skyline

on:
  schedule:
    - cron: "27 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate skyline asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/render_profile_assets.py skyline --username "${{ github.repository_owner }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          git add profile-skyline/github-skyline.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh skyline asset [skip ci]"
          git pull --rebase origin "$branch"
          git push origin HEAD:"$branch"
