name: Generate GitHub Skyline

on:
  schedule:
    - cron: "27 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-skyline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  skyline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure GitHub CLI is available
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes gh
          fi
          gh --version

      - name: Install gh-skyline extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-skyline || gh extension upgrade github/gh-skyline

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Generate skyline STL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets/skyline
          gh skyline \
            --user "bujhmml" \
            --full \
            --output assets/skyline/bujhmml-github-skyline.stl

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git add assets/skyline/bujhmml-github-skyline.stl
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh github skyline [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
