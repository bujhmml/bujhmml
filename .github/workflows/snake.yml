name: Generate Snake

on:
  schedule:
    - cron: "12 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare dist folder
        run: mkdir -p dist

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/github-contribution-grid-snake.svg

      - name: Build light and dark variants
        run: |
          python - <<'PY'
          from pathlib import Path

          base_path = Path("dist/github-contribution-grid-snake.svg")
          svg = base_path.read_text()

          original = (
              ":root{--cb:#1b1f230a;--cs:purple;--ce:#ebedf0;--c0:#ebedf0;"
              "--c1:#9be9a8;--c2:#40c463;--c3:#30a14e;--c4:#216e39}"
          )
          panel = (
              '<rect x="-12" y="-28" width="872" height="184" rx="20" '
              'fill="var(--bg)" stroke="var(--frame)" stroke-width="1.5"/>'
          )

          variants = {
              "dist/github-contribution-grid-snake.svg": (
                  ":root{--bg:#F8FAFC;--frame:#D9E3ED;--cb:#D9E3ED;--cs:#13283F;"
                  "--ce:#EEF3F7;--c0:#EEF3F7;--c1:#D7E3EE;--c2:#A9BDD0;"
                  "--c3:#6F88A5;--c4:#2F4767}"
              ),
              "dist/github-contribution-grid-snake-dark.svg": (
                  ":root{--bg:#07101B;--frame:#22384B;--cb:#22384B;--cs:#E7FBFF;"
                  "--ce:#0D1824;--c0:#0D1824;--c1:#1C2D3D;--c2:#274860;"
                  "--c3:#4B7998;--c4:#97E7FF}"
              ),
          }

          if original not in svg:
              raise SystemExit("Unexpected snake stylesheet format")

          if panel not in svg:
              svg = svg.replace("</style>", f"</style>{panel}", 1)

          for path, palette in variants.items():
              Path(path).write_text(svg.replace(original, palette, 1))
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          git add dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh snake asset [skip ci]"
          git pull --rebase origin "$branch"
          git push origin HEAD:"$branch"
