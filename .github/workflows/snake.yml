name: Generate Snake

on:
  schedule:
    - cron: "12 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-snake-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake variants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/render_profile_assets.py snake --username "${{ github.repository_owner }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git add dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh snake asset [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
