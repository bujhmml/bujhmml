name: Generate Snake

on:
  schedule:
    - cron: "12 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare dist folder
        run: mkdir -p dist

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/github-contribution-grid-snake.svg

      - name: Build light and dark variants
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          base_path = Path("dist/github-contribution-grid-snake.svg")
          svg = base_path.read_text()

          variants = {
              "dist/github-contribution-grid-snake.svg": (
                  ":root{--bg0:#040506;--bg1:#0B0E12;--frame:#717D86;"
                  "--frame-soft:#252C32;--cb:#1A2026;--cs:#F4F7F8;--ce:#0C1013;"
                  "--c0:#0C1013;--c1:#151A1F;--c2:#20272E;--c3:#313C45;"
                  "--c4:#ACBEC6;--glow:#8FA9B1;--scan:#DFE8EB;--sweep:#F5F8F9}"
              ),
              "dist/github-contribution-grid-snake-dark.svg": (
                  ":root{--bg0:#020304;--bg1:#07090C;--frame:#5A6670;"
                  "--frame-soft:#1C2329;--cb:#13181D;--cs:#F7FAFB;--ce:#080B0D;"
                  "--c0:#080B0D;--c1:#101519;--c2:#181F25;--c3:#29333B;"
                  "--c4:#9EAEB6;--glow:#98B8C0;--scan:#EDF3F5;--sweep:#FFFFFF}"
              ),
          }

          root_match = re.fullmatch(r"<svg(?P<attrs>[^>]*)>(?P<body>.*)</svg>\s*", svg, re.S)
          if not root_match:
              raise SystemExit("Unexpected snake root format")

          attrs = root_match.group("attrs")
          body = root_match.group("body")
          style_match = re.fullmatch(
              r"(?P<prefix>.*?<style>)(?P<style>.*?)(?P<suffix></style>)(?P<content>.*)",
              body,
              re.S,
          )
          if not style_match:
              raise SystemExit("Unexpected snake stylesheet format")

          view_box_match = re.search(r'viewBox="([^"]+)"', attrs)
          if not view_box_match:
              raise SystemExit("Missing viewBox on snake svg")

          min_x, min_y, width, height = map(float, view_box_match.group(1).split())
          max_x = min_x + width
          max_y = min_y + height
          radius = round(min(width, height) * 0.085, 1)
          inner_inset = round(min(width, height) * 0.0625, 1)
          inner_radius = round(max(radius - inner_inset + 2.0, 8.0), 1)
          halo_cx = round(min_x + width * 0.74, 1)
          halo_cy = round(min_y + height * 0.26, 1)
          halo_rx = round(width * 0.28, 1)
          halo_ry = round(height * 0.96, 1)
          sweep_width = round(width * 0.2, 1)
          sweep_height = round(height * 1.85, 1)
          sweep_start = round(min_x - sweep_width * 1.35, 1)
          sweep_end = round(max_x + sweep_width * 0.65, 1)
          sweep_y = round(min_y - height * 0.42, 1)
          sweep_cx = round(min_x + width / 2, 1)
          sweep_cy = round(min_y + height / 2, 1)
          scan_drift = round(height * 0.04, 1)
          stroke_inset = 0.75

          content = "".join(
              re.findall(
                  r'<rect class="(?:c(?: c\d+)?|u u\d+|s s\d+)"[^>]*/>',
                  style_match.group("content"),
              )
          )
          if not content:
              raise SystemExit("Could not extract snake geometry")

          attrs = re.sub(r'\s(?:preserveAspectRatio|overflow)="[^"]*"', "", attrs).rstrip()
          attrs = f'{attrs} preserveAspectRatio="xMidYMid meet" overflow="hidden"'

          def build_variant(palette: str) -> str:
              style = re.sub(r":root\{[^}]+\}", palette, style_match.group("style"), count=1)
              panel = f"""
          <defs>
            <linearGradient id="panel-bg" x1="{min_x}" y1="{min_y}" x2="{max_x}" y2="{max_y}" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="var(--bg0)"/>
              <stop offset="0.56" stop-color="var(--bg1)"/>
              <stop offset="1" stop-color="var(--bg0)"/>
            </linearGradient>
            <radialGradient id="panel-halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate({halo_cx} {halo_cy}) rotate(90) scale({halo_ry} {halo_rx})">
              <stop stop-color="var(--glow)" stop-opacity="0.16"/>
              <stop offset="0.48" stop-color="var(--glow)" stop-opacity="0.05"/>
              <stop offset="1" stop-color="var(--glow)" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="panel-sweep" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="var(--sweep)" stop-opacity="0"/>
              <stop offset="0.52" stop-color="var(--sweep)" stop-opacity="0.1"/>
              <stop offset="1" stop-color="var(--sweep)" stop-opacity="0"/>
            </linearGradient>
            <pattern id="panel-scanlines" width="12" height="12" patternUnits="userSpaceOnUse">
              <rect width="12" height="12" fill="transparent"/>
              <path d="M0 2.5H12" stroke="var(--scan)" stroke-opacity="0.06"/>
            </pattern>
            <clipPath id="panel-clip" clipPathUnits="userSpaceOnUse">
              <rect x="{min_x}" y="{min_y}" width="{width}" height="{height}" rx="{radius}" ry="{radius}"/>
            </clipPath>
          </defs>
          <g clip-path="url(#panel-clip)">
            <rect x="{min_x}" y="{min_y}" width="{width}" height="{height}" rx="{radius}" fill="url(#panel-bg)"/>
            <rect x="{min_x}" y="{min_y}" width="{width}" height="{height}" rx="{radius}" fill="url(#panel-halo)">
              <animate attributeName="opacity" values="0.1;0.18;0.1" dur="16s" repeatCount="indefinite"/>
            </rect>
            {content}
            <g opacity="0.18">
              <animateTransform attributeName="transform" type="translate" values="0 0;0 {scan_drift};0 0" dur="18s" repeatCount="indefinite"/>
              <rect x="{min_x}" y="{min_y}" width="{width}" height="{height}" rx="{radius}" fill="url(#panel-scanlines)"/>
            </g>
            <rect x="{sweep_start}" y="{sweep_y}" width="{sweep_width}" height="{sweep_height}" fill="url(#panel-sweep)" opacity="0.11" transform="rotate(12 {sweep_cx} {sweep_cy})">
              <animate attributeName="x" values="{sweep_start};{sweep_end};{sweep_start}" dur="24s" repeatCount="indefinite"/>
            </rect>
          </g>
          <rect x="{min_x + stroke_inset}" y="{min_y + stroke_inset}" width="{width - stroke_inset * 2}" height="{height - stroke_inset * 2}" rx="{radius - stroke_inset}" fill="none" stroke="var(--frame)" stroke-opacity="0.55" stroke-width="1.5"/>
          <rect x="{min_x + inner_inset}" y="{min_y + inner_inset}" width="{width - inner_inset * 2}" height="{height - inner_inset * 2}" rx="{inner_radius}" fill="none" stroke="var(--frame-soft)" stroke-opacity="0.42" stroke-width="1"/>
          """
              return f'<svg{attrs}>{style_match.group("prefix")}{{style}}</style>{panel}</svg>'.format(style=style)

          for path, palette in variants.items():
              Path(path).write_text(build_variant(palette))
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          git add dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh snake asset [skip ci]"
          git pull --rebase origin "$branch"
          git push origin HEAD:"$branch"
